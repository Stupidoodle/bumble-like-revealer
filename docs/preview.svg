<svg xmlns="http://www.w3.org/2000/svg" width="468" height="536" viewBox="0 0 468 536" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131217"/>
      <stop offset="1" stop-color="#0b0b0e"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F6B23C" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F6B23C"/>
    </linearGradient>
  </defs>

  <style>
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .eyebrow { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10px; letter-spacing: 1.4px; fill: #8C887F; }
    .label { font-size: 12.5px; fill: #8C887F; }
    .val { font-size: 12.5px; fill: #F3F1EC; }
    .hr { stroke: #ffffff; stroke-opacity: 0.07; }
  </style>

  <!-- panel -->
  <rect x="1" y="1" width="466" height="534" rx="14" fill="url(#panel)" stroke="#F6B23C" stroke-opacity="0.16"/>
  <rect x="1" y="1" width="3" height="534" rx="1.5" fill="#F6B23C" fill-opacity="0.5"/>

  <!-- header -->
  <text x="22" y="30" class="mono" font-size="11" fill="#8C887F">GET_USER 200 · 84ms · 85/95</text>
  <text x="446" y="31" text-anchor="end" font-size="15" fill="#8C887F">✕</text>
  <line x1="0" y1="46" x2="468" y2="46" class="hr"/>

  <!-- hero -->
  <g transform="translate(22,60)">
    <rect width="58" height="58" rx="9" fill="#2b2b31"/>
    <circle cx="29" cy="22" r="11" fill="#5a5a64"/>
    <rect x="11" y="36" width="36" height="22" rx="11" fill="#5a5a64"/>
  </g>
  <!-- verdict + my vote -->
  <rect x="92" y="62" width="118" height="22" rx="6" fill="#F6B23C"/>
  <text x="103" y="77" font-size="12" font-weight="700" fill="#17140c">LIKED YOU ♥</text>
  <text x="92" y="103" class="label" font-size="11">you: liked</text>
  <!-- score -->
  <text x="446" y="98" text-anchor="end" class="mono" font-size="46" font-weight="700" fill="#F3F1EC">706<tspan font-size="14" fill="#8C887F">/1000</tspan></text>
  <rect x="300" y="110" width="146" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="300" y="110" width="103" height="3" rx="1.5" fill="url(#spark)"/>
  <line x1="0" y1="138" x2="468" y2="138" class="hr"/>

  <!-- ACTIVITY -->
  <text x="22" y="162" class="eyebrow">ACTIVITY</text>
  <text x="22" y="184" class="label">Online</text>
  <circle cx="402" cy="180" r="3.5" fill="#45D27A"/>
  <text x="446" y="184" text-anchor="end" class="val">now</text>
  <text x="22" y="206" class="label">Photos · Videos</text>
  <text x="446" y="206" text-anchor="end" class="val mono">6 · 1</text>
  <line x1="22" y1="224" x2="446" y2="224" class="hr"/>

  <!-- IDENTITY -->
  <text x="22" y="248" class="eyebrow">IDENTITY</text>
  <text x="22" y="272" font-size="16" font-weight="600" fill="#F3F1EC">Jordan<tspan class="mono" font-size="13" fill="#ADA9A0" dx="6">24</tspan></text>
  <text x="446" y="271" text-anchor="end" class="mono" font-size="11" fill="#F6B23C">✓ verified</text>
  <g font-size="11">
    <rect x="22" y="284" width="58" height="20" rx="6" fill="none" stroke="#F6B23C" stroke-opacity="0.45"/>
    <text x="51" y="298" text-anchor="middle" fill="#ADA9A0">Woman</text>
    <rect x="88" y="284" width="78" height="20" rx="6" fill="none" stroke="#F6B23C" stroke-opacity="0.45"/>
    <text x="127" y="298" text-anchor="middle" fill="#ADA9A0">Phone number</text>
  </g>
  <line x1="22" y1="322" x2="446" y2="322" class="hr"/>

  <!-- LOCATION -->
  <text x="22" y="346" class="eyebrow">LOCATION</text>
  <text x="22" y="370" class="val" font-size="13">~3 km away</text>
  <g transform="translate(388,361)"><rect width="15" height="10" rx="1.5" fill="#111"/><rect width="15" height="3.34" fill="#000"/><rect y="3.34" width="15" height="3.33" fill="#D00"/><rect y="6.67" width="15" height="3.33" fill="#FFCE00"/></g>
  <text x="446" y="370" text-anchor="end" class="label">Berlin, DE</text>
  <line x1="22" y1="388" x2="446" y2="388" class="hr"/>

  <!-- PROFILE -->
  <text x="22" y="412" class="eyebrow">PROFILE</text>
  <text x="22" y="434" class="mono" font-size="10" fill="#F6B23C" letter-spacing="0.6">MOST SPONTANEOUS THING I'VE DONE</text>
  <text x="22" y="456" font-size="14" font-style="italic" fill="#F3F1EC">booked a one-way flight at 2am</text>
  <line x1="22" y1="476" x2="446" y2="476" class="hr"/>

  <!-- PERMISSIONS row -->
  <text x="22" y="500" class="eyebrow">PERMISSIONS &amp; STATE</text>
  <text x="446" y="500" text-anchor="end" class="mono" font-size="11" fill="#8C887F">5 / 13 enabled ›</text>

  <!-- footer -->
  <line x1="0" y1="514" x2="468" y2="514" class="hr"/>
  <text x="22" y="529" class="mono" font-size="10.5" fill="#8C887F">live · 84ms</text>
  <text x="446" y="530" text-anchor="end" font-size="13" fill="#F6B23C">↻</text>
</svg>
